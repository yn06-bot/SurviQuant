name: Keep Streamlit Awake

on:
  schedule:
    - cron: '*/5 * * * *'   # 5분마다
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping SurviQuant
        run: |
          curl -L --max-redirs 10 --max-time 60 -o /dev/null -w "%{http_code}" \
            https://surviquant.streamlit.app/_stcore/health \
          && echo " ✅ Awake"
