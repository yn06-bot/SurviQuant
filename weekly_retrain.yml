name: Weekly Model Retrain

on:
  schedule:
    - cron: '0 0 * * 0' # 매주 일요일 자정 실행
  workflow_dispatch:

jobs:
  retrain-model:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v3

      - name: Python 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Random Survival Forest 모델 파라미터 재학습
        run: python src/models.py

      - name: 모델 성능 지표 검증 (C-index) 및 롤백 체크
        run: python src/scoring.py --validate