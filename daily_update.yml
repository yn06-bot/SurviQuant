name: Daily Data & Score Update

on:
  schedule:
    - cron: '0 21 * * 1-5' # 월~금 장 마감 후 실행 (UTC 기준)
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v3

      - name: Python 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 일일 주가 수집 및 스코어 갱신 추론
        run: |
          python src/data_loader.py
          python src/export.py

      - name: 갱신된 JSON 정적 파일 커밋 및 푸시
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/*.json
          git commit -m "Auto-update: Daily S&P 500 data and AI Scores" || echo "No changes to commit"
          git push